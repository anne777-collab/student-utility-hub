<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="google-adsense-account" content="ca-pub-6342407589181909">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6342407589181909"
       crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Contact Student Utility Hub for questions, feedback, or suggestions through a simple contact form."
  >
  <title>Contact Us | Student Utility Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-content">
      <a class="brand" href="index.html">Student Utility Hub</a>
      <div class="nav-links">
        <a class="nav-link" href="index.html#tools">Utilities</a>
        <a class="nav-link" href="about.html">About</a>
        <a class="nav-link" href="privacy.html">Privacy</a>
        <a class="nav-link" href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <main class="page-shell">
    <div class="container">
      <article class="page-card">
        <p class="eyebrow">Contact Us</p>
        <h1>We’d love to hear from you.</h1>
        <p class="page-intro">
          Use the form below for feedback, questions, or suggestions about Student Utility Hub.
        </p>

        <form class="contact-form" novalidate>
          <label class="field">
            <span>Name</span>
            <input type="text" name="name" placeholder="Enter your name">
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter your email">
          </label>

          <label class="field">
            <span>Message</span>
            <textarea name="message" placeholder="Write your message here"></textarea>
          </label>

          <button class="button button-primary" type="submit">Send Message</button>
        </form>

        <div class="page-note">We will respond within 24–48 hours.</div>
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a class="nav-link" href="about.html">About Us</a>
        <a class="nav-link" href="privacy.html">Privacy Policy</a>
        <a class="nav-link" href="contact.html">Contact Us</a>
      </div>
      <p>Made by Jiaan</p>
    </div>
  </footer>
</body>
</html>
